<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BDT Zara PRO V4.1</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-card { border: 2px solid #00ff00; padding: 20px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 0 20px #00ff00; }
        .hidden { display: none; }
        input, button { width: 90%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #00ff00; background: #000; color: #00ff00; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; }
        .res-box { font-size: 28px; font-weight: bold; margin: 20px 0; color: #fff; padding: 10px; border: 1px dashed #00ff00; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="auth-panel">
        <h2>Boom_myhack_bot ACCESS</h2>
        <input type="password" id="access_key" placeholder="ENTER KEY">
        <button onclick="checkKey()">ACTIVATE</button>
    </div>

    <div id="hack-panel" class="hidden">
        <h3>WINGO ANALYZER</h3>
        <p>Period: <span id="period_id">...</span></p>
        <div class="res-box" id="result_area">WAITING...</div>
        <p id="timer_area">00:00</p>
    </div>
</div>

<script>
    const ADMIN_LINK = "https://t.me/rifat_developer";
    const KEY = "7night";
    
    // নির্দিষ্ট এক্সপায়ারি ডেট সেট করা (বছর, মাস-১, দিন)
    // আগস্ট ৩১, ২০২৫ (মাস ০ থেকে শুরু হয়, তাই আগস্ট = ৭)
    const expiryDate = new Date(20269, 6, 18, 23, 59, 59).getTime();

    if (Date.now() > expiryDate) {
        document.body.innerHTML = `
        <div style="text-align:center;color:#00ff00;font-family:Courier New; padding: 20px;">
            <h2>ACCESS EXPIRED</h2>
            <p>Your Access Expired on August 31, 2025</p>
            <button onclick="window.open('${ADMIN_LINK}','_blank')"
            style="padding:12px 20px; background:#00ff00; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">
            CONTACT ADMIN
            </button>
        </div>`;
        throw new Error("Expired");
    }

    function checkKey() {
        if(document.getElementById("access_key").value === KEY) {
            document.getElementById("auth-panel").classList.add("hidden");
            document.getElementById("hack-panel").classList.remove("hidden");
            startEngine();
        } else {
            alert("Invalid Key!");
        }
    }

    function startEngine() {
        setInterval(() => {
            const now = new Date();
            const utc = new Date(now.getTime() + now.getTimezoneOffset() * 60000);
            const seconds = utc.getSeconds();
            const totalMinutes = (utc.getHours() * 60) + utc.getMinutes();
            const period = utc.getFullYear().toString() + (utc.getMonth()+1).toString().padStart(2,'0') + utc.getDate().toString().padStart(2,'0') + "01" + (10001 + totalMinutes);
            
            document.getElementById("period_id").innerText = period;
            document.getElementById("timer_area").innerText = "Next: " + (60 - seconds) + "s";

            if (seconds === 0 || document.getElementById("result_area").innerText === "WAITING...") {
                generatePrediction(period);
            }
        }, 1000);
    }

    function generatePrediction(period) {
        let hash = 0;
        for (let i = 0; i < period.length; i++) {
            hash = period.charCodeAt(i) + ((hash << 5) - hash);
        }
        let val = Math.abs(hash % 10);
        
        let result = (val >= 5) ? "BIG" : "SMALL";
        let color = (val % 2 === 0) ? "RED" : "GREEN";
        if (val === 0 || val === 5) color = "VIOLET";

        document.getElementById("result_area").innerHTML = `${result}<br><span style="font-size:16px;">COLOR: ${color}</span>`;
    }
</script>

</body>
</html>
